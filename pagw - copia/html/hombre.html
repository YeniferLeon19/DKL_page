
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DKL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/hombre.css">
</head>

<body>
<header>

    <div class="logo">DarK Liquid</div>

    <nav class="nav-categorias">
        <a href="index.html" class="category-card">TIENDA</a>
        <a href="hombre.html" class="category-card">HOMBRE</a>
        <a href="mujer.html" class="category-card">MUJER</a>
        <div class="category-card">ACCESORIOS</div>
    </nav>

    <a href="carrito.html" class="cart-icon">
        <svg class="cart-svg" viewBox="0 0 24 24" fill="none">
            <path d="M6 6h15l-1.5 9h-12z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
            <circle cx="18" cy="20" r="1.5" fill="currentColor"/>
        </svg>
        <span class="cart-text">Carrito</span>
        <span id="contador">0</span>
    </a>

</header>


<div class="layout">

    <!-- 🔥 SIDEBAR -->
    <aside class="sidebar">
        <h2>Filtrar</h2>

        <button onclick="filtrar('todos')">Todos</button>
        <button onclick="filtrar('camisa')">Camisetas</button>
        <button onclick="filtrar('pantalon')">Pantalones</button>
        <button onclick="filtrar('buso')">Busos</button>
    </aside>

    <!-- 🔥 CONTENIDO -->
    <main class="contenido">

        <section class="featured-products">
            <h2>PRODUCTOS</h2>

            <div class="product-grid">

                <div class="product-card" data-categoria="camisa">
                <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Camisa">
                    <h3>Camisa Oversize</h3>
                    <p>$89.900</p>
                </div>

                <div class="product-card" data-categoria="pantalon">
                    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Camisa" alt ="Pantalón">
                    <h3>Pantalón Cargo</h3>
                    <p>$120.000</p>
                </div>

                <div class="product-card" data-categoria="buso">
                    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Camisa"> alt="Buso">
                    <h3>Buso Hoodie</h3>
                    <p>$95.000</p>
                </div>

            </div>

        </section>

    </main>

</div>
<script src="../js/hombre.js"></script>
</body>
</html>
