
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DKL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8" />
<link rel="stylesheet" href="../css/hombre.css">
<link rel="stylesheet" href="../css/global.css">
</head>

<body>

<div class="cursor"></div>
<div class="cursor-follower"></div>
<div id="header-container"></div>


<div class="layout">

    <!-- 🔥 SIDEBAR -->
    <aside class="sidebar">
        <h2>Filtrar</h2>

        <button onclick="filtrar('todos')">Todos</button>
        <button onclick="filtrar('camisa')">Camisetas</button>
        <button onclick="filtrar('pantalon')">Pantalones</button>
        <button onclick="filtrar('buso')">Busos</button>
    </aside>

    <!-- 🔥 CONTENIDO -->
    <main class="contenido">

        <section class="featured-products">
            <h2>PRODUCTOS</h2>

<div class="product-grid">

    <!-- PRODUCTO 1 -->
    <div class="product-card" data-categoria="camisa">

        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Camisa">

        <h3>Camisa Oversize</h3>

        <p>$89.900</p>

        <button onclick="agregarAlCarrito('Camisa Oversize', 89900)">
            Agregar al carrito
        </button>

    </div>

    <!-- PRODUCTO 2 -->
    <div class="product-card" data-categoria="pantalon">

        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Pantalón">

        <h3>Pantalón Cargo</h3>

        <p>$120.000</p>

        <button onclick="agregarAlCarrito('Pantalón Cargo', 120000)">
            Agregar al carrito
        </button>

    </div>

    <!-- PRODUCTO 3 -->
    <div class="product-card" data-categoria="buso">

        <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Buso">

        <h3>Buso Hoodie</h3>

        <p>$95.000</p>

        <button onclick="agregarAlCarrito('Buso Hoodie', 95000)">
            Agregar al carrito
        </button>

    </div>

</div>

        </section>

    </main>

</div>
<script src="../js/hombre.js"></script>
<script src="../js/carrito.js"></script>
<script src="../js/cursor.js"></script>
<script src="../js/header.js"></script>
</body>
</html>
